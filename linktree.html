<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.6">
    <title>Tugas Linktree Fayza Vicka Khairina</title>

    <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Capriola', 'Inter', sans-serif;
            background-color: #9E341F;
            background-attachment: fixed;
            padding-top: 2rem;
        }

        .main-container {
            max-width: 31.25rem;
            margin: 0 auto;
            border-radius: 1.25rem;
            overflow: hidden;
            box-shadow: 0 0.25rem 0.625rem 0.125rem rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .bg-image {
            width: 100%;
            display: block;
        }

        .content-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 1rem;
        }

        .btn-custom {
            background-color: #FFFFFF;
            border: 0.09rem solid #121212;
            color: #000000;
            border-radius: 1.7rem;
            margin-bottom: 0.625rem;
            padding: 1rem 1.25rem;
            box-shadow: 0.2rem 0.25rem 0rem rgba(0, 0, 0, 100);
        }

        .btn-custom:hover {
            background-color: #e6e6e6;
            box-shadow: 0.2rem 0.25rem 0rem rgba(0, 0, 0, 100);
        }

        .social-icon img {
            width: 1.8rem;
            height: 1.8rem;
            transition: transform 0.12s ease;
        }

        .social-icon img:hover {
            transform: scale(1.1);
        }

        .footer-link {
            color: #000000;
            font-size: 0.5rem;
            text-decoration: none;
            border-bottom: 0.1rem solid transparent;
        }

        .footer-link:hover {
            color: #000000;
            border-bottom: 0.1rem solid #000000;
            text-decoration: none;
        }

        .footer-dot {
            color: #000000;
            font-size: 0.5rem;
        }
        
    </style>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="main-container">

        <!-- Gambar Background -->
        <img src="assets/img/bg mangkokku fix ril.png" alt="Background" class="bg-image">
        <div class="content-overlay">

            <!-- Header -->
            <div class="row">
                <div class="col text-left">
                    <img src="assets/img/linktree button.png" alt="Left Button" class="w-25 rounded-circle" style="cursor: pointer;">
                </div>
                <div class="col text-right">
                    <img src="assets/img/share button.png" alt="Right Button" class="w-25 rounded-circle" style="cursor: pointer;">
                </div>
            </div>

            <!-- Profil + Tombol -->
            <div class="text-center">
                <img src="assets/img/logo mangkokku.png" class="w-25 rounded" alt="...">
                <p></p>
                <h5 class="card-title font-weight-bold">@mangkokku_id</h5>
                <p class="card-text">Rice Bowl Enak, Cepat & Praktis✨</p>
                <p class="card-text font-weight-bold">Makan Di Resto Mangkokku</p>
                <button type="button" class="btn btn-custom btn-block">Temukan Outlet Mangkokku</button>
                <p></p>
                <button type="button" class="btn btn-custom btn-block">Reservasi Dine-In di Mangkokku</button>
                <p></p>
                <p class="card-text font-weight-bold">Pesan Online</p>
                <button type="button" class="btn btn-custom btn-block">GRABFOOD ORDER</button>
                <p></p>
                <button type="button" class="btn btn-custom btn-block">GOFOOD ORDER</button>
                <p></p>
                <button type="button" class="btn btn-custom btn-block">SHOPEE FOOD ORDER</button>
                <p></p>
                <button type="button" class="btn btn-custom btn-block">Order via WA - Diskon hingga 50%</button>
                <p></p>
                <p class="card-text font-weight-bold">Mangkokku Bulk Order</p>
                <button type="button" class="btn btn-custom btn-block">Mangkokku Catering</button>
                <p></p>
                <p class="card-text font-weight-bold">More Info</p>
                <button type="button" class="btn btn-custom btn-block">Mangkokku Customer Care
                </button>
                <p></p>
                <button type="button" class="btn btn-custom btn-block">Website Mangkokku</button>
                <p></p>

                <!-- Social Media -->
                <div class="row justify-content-center mt-2 mb-5">
                    <div class="col-auto">
                        <div class="d-flex justify-content-center" style="gap: 0.8rem;">
                            <a href="#" class="social-icon"><img src="assets/img/facebook.png" alt="Facebook"></a>
                            <a href="#" class="social-icon"><img src="assets/img/instagram.png" alt="Instagram"></a>
                            <a href="#" class="social-icon"><img src="assets/img/tiktok.png" alt="TikTok"></a>
                            <a href="#" class="social-icon"><img src="assets/img/linkedin.png" alt="LinkedIn"></a>
                            <a href="#" class="social-icon"><img src="assets/img/whatsapp.png" alt="WhatsApp"></a>
                            <a href="#" class="social-icon"><img src="assets/img/x.png" alt="X"></a>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="row justify-content-center mt-1">
                    <div class="col-auto">
                        <div class="d-flex justify-content-center flex-wrap" style="gap: 0.3rem;">
                            <a href="#" class="footer-link">Cookie Preferences</a>
                            <span class="footer-dot">·</span>
                            <a href="#" class="footer-link">Report</a>
                            <span class="footer-dot">·</span>
                            <a href="#" class="footer-link">Privacy</a>
                            <span class="footer-dot">·</span>
                            <a href="#" class="footer-link">Explore</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
